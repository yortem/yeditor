name: Release and Version Management

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and Minify JavaScript
        run: npx esbuild src/editor.js --bundle --minify --outfile=dist/editor.min.js --define:VERSION="${{ steps.version.outputs.VERSION }}"

      - name: Build and Minify CSS
        run: npx esbuild src/editor.css --minify --outfile=dist/editor.min.css

      - name: Copy language files
        run: |
          mkdir -p dist/lang
          cp src/lang/*.json dist/lang/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CDN tags
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"
          
          # Update major tag (v1 -> v1, v2 -> v2)
          curl -s -X PUT https://api.github.com/repos/${{ github.repository }}/git/refs/tags/v$MAJOR \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d '{"sha": "${{ github.sha }}", "force": true}' || true
          
          # Update minor tag (v1.2 -> v1.2)
          curl -s -X PUT https://api.github.com/repos/${{ github.repository }}/git/refs/tags/v$MINOR \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d '{"sha": "${{ github.sha }}", "force": true}' || true